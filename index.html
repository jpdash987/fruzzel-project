<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z Sales Tracker — Daily Sales + Profit + Online</title>
    <style>
      body { margin: 0; background: #0f1115; }
      .root-startup-loader {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .root-pulsing-logo {
        width: 80px; height: 80px; border-radius: 20px;
        background: linear-gradient(135deg, #4f46e5, #818cf8);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        animation: rootPulse 2s infinite ease-in-out;
      }
      @keyframes rootPulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
      }
      .root-startup-loader h2 { color: #f8fafc; font-size: 1.4rem; font-weight: 700; margin: 0 0 5px 0; letter-spacing: -0.5px; }
      .root-startup-loader p { color: #94a3b8; font-size: 0.85rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
      .root-spinner {
        margin-top: 10px; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #6366f1; border-radius: 50%; animation: rootSpin 1s linear infinite;
      }
      @keyframes rootSpin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="root-startup-loader">
        <div class="root-pulsing-logo">
          <img src="/logo.png" alt="Z Logo" style="width: 50px; object-fit: contain;" />
        </div>
        <div style="text-align: center;">
          <h2>Sales Tracker</h2>
          <p>Profit & Online System</p>
        </div>
        <div class="root-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
